services:

  db:
    image: mysql:8.0

    container_name: bank-db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: online_bank
      MYSQL_USER: bankuser
      MYSQL_PASSWORD: bankpass123

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - bank-network

  backend:
    build:
      context: ./backend

    container_name: bank-backend

    restart: always

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      - db

    networks:
      - bank-network

  frontend:
    build:
      context: ./frontend-react

    container_name: bank-frontend

    restart: always

    ports:
      - "5173:5173"

    depends_on:
      - backend

    networks:
      - bank-network

volumes:
  mysql-data:

networks:
  bank-network: