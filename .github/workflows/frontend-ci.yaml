name: Frontend CI

on:
  push:
    branches:
      - main

jobs:
  build-frontend:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build frontend image
      run: |
        docker build -t pcdeking/online-bank-app-frontend:${{ github.sha }} ./frontend-react

    - name: Push image
      run: |
        docker push pcdeking/online-bank-app-frontend:${{ github.sha }} 